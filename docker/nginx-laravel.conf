server {
    listen 80;
    server_name _;
    root /var/www/html/public;
    index index.php index.html;

    # Laravel front controller
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Block hidden files and directories such as .htaccess
    location ~ /\.(?!well-known).* {
        deny all;
    }

    # Keep the front controller internal so it is not exposed as a public endpoint.
    location = /index.php {
        internal;
        include /etc/nginx/fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_pass 127.0.0.1:9000;   # PHP-FPM default
        fastcgi_hide_header X-Powered-By;
        fastcgi_read_timeout 300;
        fastcgi_buffering on;
    }

    # Prevent direct public access to the Vite manifest
    location = /build/manifest.json {
        deny all;
    }

    # Deny direct execution of any other PHP file in public.
    location ~ \.php$ {
        return 404;
    }

    # Static assets (cache)
    location ~* \.(?:ico|css|js|gif|jpe?g|png|webp|svg|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public";
        try_files $uri $uri/ /index.php?$query_string;
    }

    client_max_body_size 20m;

    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;
}