services:
  app:
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      - APP_ENV=local
      - APP_DEBUG=false
    # Resource limits untuk production
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M